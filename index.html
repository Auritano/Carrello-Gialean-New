<html lang="it">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            font-size: 16px;
            line-height: 1.5;
        }
        
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #232f3e;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        h2 {
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 16px;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px; /* Importante per evitare lo zoom su iPhone */
            -webkit-appearance: none; /* Rimuove lo stile predefinito su iOS */
            appearance: none;
            background-color: #fff;
        }
        
        /* Aggiunta freccia personalizzata per i select */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24'%3e%3cpath fill='none' d='M0 0h24v24H0z'/%3e%3cpath d='M12 15l-4.243-4.243 1.415-1.414L12 12.172l2.828-2.829 1.415 1.414z' fill='%23232f3e'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 20px;
            padding-right: 30px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ff9900;
            box-shadow: 0 0 0 2px rgba(255, 153, 0, 0.2);
        }
        
        input[type="number"] {
            -moz-appearance: textfield; /* Firefox */
        }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        button {
            width: 100%;
            background-color: #ff9900;
            color: white;
            border: none;
            padding: 14px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.3s;
            margin-bottom: 10px;
            -webkit-appearance: none; /* Rimuove lo stile predefinito su iOS */
            appearance: none;
        }
        
        button:hover, button:active {
            background-color: #e88e00;
        }
        
        #reset-btn {
            background-color: #dc3545;
        }
        
        #reset-btn:hover, #reset-btn:active {
            background-color: #c82333;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 15px;
        }
        
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f2f2f2;
        }
        
        .cart-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-details {
            margin-bottom: 10px;
        }
        
        .cart-item button {
            background-color: #dc3545;
            padding: 8px 10px;
            margin-bottom: 0;
            font-size: 14px;
        }
        
        .total {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #ddd;
            font-weight: bold;
            font-size: 18px;
        }
        
        #receipt {
            margin-top: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        
        #receipt h2 {
            margin-top: 0;
            color: #232f3e;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        
        .hide {
            display: none;
        }
        
        /* Layout flessibile per cliente e data */
        .cliente-data-container {
            display: flex;
            gap: 15px;
        }
        
        .cliente-data-container > div {
            flex: 1;
        }
        
        /* Responsive layout*/
        @media (min-width: 500px) {
            .form-row {
                display: flex;
                gap: 15px;
                margin-bottom: 15px;
            }
            
            .form-row > div {
                flex: 1;
            }
            
            .button-group {
                display: flex;
                gap: 10px;
            }
            
            .button-group button {
                margin-bottom: 0;
            }
        }
        
        /* Versione per stampa */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            
            .container {
                box-shadow: none;
                max-width: 100%;
            }
            
            button, #carrello, .form-group, .form-row {
                display: none !important;
            }
            
            #receipt {
                display: block !important;
                border: none;
                padding: 0;
                margin: 0;
            }
            
        }

        #zip-btn {
            background-color: #2e7d32;
        }
        #zip-btn:hover, #zip-btn:active {
            background-color: #1b5e20;
        }
    </style>

</head>

    <div class="container">
        <h1>Carrello Acquisti</h1>
        
        <div class="cliente-data-container">
            <div class="form-group">
                <label for="cliente">Nome Cliente:</label>
                <input type="text" id="cliente" placeholder="Inserisci il nome del cliente" autocomplete="name">
            </div>
            
            <div class="form-group">
                <label for="data-attuale">Data:</label>
                <input type="text" id="data-attuale" readonly>
            </div>
        </div>
        
        <div>
            <div class="form-group">
                <label for="categoria">Categoria:</label>
                                <select id="categoria">
                    <option value="">Seleziona una categoria</option>
                    <option value="PRODOTTI">PRODOTTI</option>
                    <option value="OFFERTE PERMANENTI">OFFERTE PERMANENTI</option>
                    <option value="OFFERTE STAGIONALI DAL 16/03/2026 AL 26/07/2026">OFFERTE STAGIONALI DAL 16/03/2026 AL 26/07/2026</option>
                    <option value="OFFERTE STAGIONALI DAL 11/05/2026 AL 26/07/2026">OFFERTE STAGIONALI DAL 11/05/2026 AL 26/07/2026</option>
                </select>
            </div>

            <div class="form-group" id="gruppo-linea" style="display:none">
                <label for="linea">Linea / Offerta:</label>
                <select id="linea" disabled>
                    <option value="">Seleziona prima una categoria</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="prodotto">Prodotto:</label>
                <select id="prodotto" disabled>
                    <option value="">Seleziona prima una linea</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="prezzo">Prezzo (€):</label>
                <input type="text" id="prezzo" readonly>
            </div>
            
            <div class="form-group">
                <label for="quantita">Quantità:</label>
                <input type="number" id="quantita" min="1" value="1" pattern="[0-9]*" inputmode="numeric">
            </div>
        </div>
        
        <div class="button-group">
            <button id="aggiungi-btn">Aggiungi al Carrello</button>
            <button id="reset-btn">Svuota Carrello</button>
        </div>
        
        <div id="carrello">
            <h2>Prodotti nel Carrello</h2>
            <div id="items-container"></div>
            <div class="total">
                <span>Totale:</span>
                <span id="totale">€0.00</span>
            </div>
        </div>
        
        <div id="receipt" class="hide">
            <h2>Ordine</h2>
            <p><strong>Cliente:</strong> <span id="receipt-cliente"></span></p>
            <p><strong>Data:</strong> <span id="receipt-data"></span></p>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Prodotto</th>
                            <th>Prezzo</th>
                            <th>Qtà</th>
                            <th>Totale</th>
                        </tr>
                    </thead>
                    <tbody id="receipt-items">
                    </tbody>
                </table>
            </div>
            <div class="total">
                <span>Totale:</span>
                <span id="receipt-totale">€0.00</span>
            </div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="zip-btn">⬇ Scarica Ordine</button>
            </div>
        </div>
    </div>

        function aggiornaData() {

                year: 'numeric',

        // Funzione per salvare lo stato
        function salvaStato() {
            const stato = {
                carrello: carrello,
                totale: totale
            };
            try {
                localStorage.setItem('carrelloStato', JSON.stringify(stato));
            } catch (e) {
                console.log('Impossibile salvare in localStorage:', e);
            }
        }
        
        // Funzione per ripristinare lo stato
        function ripristinaStato() {
            try {
                const statoSalvato = localStorage.getItem('carrelloStato');
                if (statoSalvato) {
                    const stato = JSON.parse(statoSalvato);
                    carrello = stato.carrello || [];
                    totale = stato.totale || 0;
                    aggiornaCarrello();
                }
            } catch (e) {
                console.log('Impossibile ripristinare da localStorage:', e);
            }

        categoriaSelect.addEventListener('change', function() {

            prezzoInput.value = '';

            if (cat && linea && catalogo[cat] && catalogo[cat][linea]) {
                prodottoSelect.disabled = false;

        // Livello 3: cambio prodotto → mostra prezzo
        prodottoSelect.addEventListener('change', function() {
            const cat = categoriaSelect.value;
            const linea = lineaSelect.value;
            const prodottoSelezionato = this.value;
            
            if (cat && linea && prodottoSelezionato) {
                const prodotto = catalogo[cat][linea].find(p => p.nome === prodottoSelezionato);
                prezzoInput.value = prodotto ? fmt(prodotto.prezzo) : '';
            } else {
                prezzoInput.value = '';
            }
        });

        // Aggiungi prodotto al carrello
        aggiungiBtn.addEventListener('click', function() {
            const categoriaSelezionata = categoriaSelect.value;
            const lineaSelezionata = lineaSelect.value;
            const prodottoSelezionato = prodottoSelect.value;
            const prezzo = parseFloat(prezzoInput.value.replace(',', '.'));
            const quantita = parseInt(quantitaInput.value);
            const cliente = document.getElementById('cliente').value;
            
            if (!cliente) {
                alert('Inserisci il nome del cliente');
                return;
            }
            
            if (!categoriaSelezionata || !lineaSelezionata || !prodottoSelezionato || isNaN(prezzo) || isNaN(quantita) || quantita <= 0) {
                alert('Seleziona categoria, linea, prodotto e una quantità valida');
                return;
            }
            
            const subtotale = prezzo * quantita;
            const prodottoEsistente = carrello.findIndex(item => 
                item.categoria === categoriaSelezionata && item.linea === lineaSelezionata && item.prodotto === prodottoSelezionato
            );
            
            if (prodottoEsistente >= 0) {
                totale -= carrello[prodottoEsistente].subtotale;
                carrello[prodottoEsistente].quantita += quantita;
                carrello[prodottoEsistente].subtotale = carrello[prodottoEsistente].prezzo * carrello[prodottoEsistente].quantita;
                totale += carrello[prodottoEsistente].subtotale;
            } else {
                carrello.push({
                    categoria: categoriaSelezionata,
                    linea: lineaSelezionata,
                    prodotto: prodottoSelezionato,
                    prezzo: prezzo,
                    quantita: quantita,
                    subtotale: subtotale
                });
                totale += subtotale;
            }
            
            // Aggiorna il carrello
            aggiornaCarrello();
            
            // Resetta i campi
            prodottoSelect.selectedIndex = 0;
            prezzoInput.value = '';
            quantitaInput.value = 1;
            
            // Salva lo stato
            salvaStato();
            
            // Feedback visivo di successo
            aggiungiBtn.textContent = "Prodotto Aggiunto!";
            aggiungiBtn.style.backgroundColor = "#28a745";
            setTimeout(() => {
                aggiungiBtn.textContent = "Aggiungi al Carrello";
                aggiungiBtn.style.backgroundColor = "#ff9900";
            }, 1000);
        });

        // Aggiorna visualizzazione del carrello
        function aggiornaCarrello() {
            itemsContainer.innerHTML = '';
            
            if (carrello.length === 0) {
                itemsContainer.innerHTML = '<p>Il tuo carrello è vuoto</p>';
                totaleSpan.textContent = '€0.00';
                receiptDiv.classList.add('hide');
                return;
            }
            
            carrello.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <div class="cart-item-details">
                        <strong>${item.prodotto}</strong><br>
                        <small>${item.categoria} › ${item.linea}</small><br>

                    </div>
                    <button class="remove-btn" data-index="${index}">Rimuovi</button>
                `;
                itemsContainer.appendChild(itemDiv);
            });
            
            // Aggiorna totale
            totaleSpan.textContent = `€${fmt(totale)}`;
            
            // Aggiorna Ordine
            aggiornaOrdine();

            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    rimuoviProdotto(index);
                });
            });

        // Rimuovi prodotto dal carrello
        function rimuoviProdotto(index) {
            if (index >= 0 && index < carrello.length) {
                totale -= carrello[index].subtotale;
                carrello.splice(index, 1);
                aggiornaCarrello();
                salvaStato();

                    linea: item.linea,
                    prezzo: item.prezzo,
                    qty: item.quantita,
                    totale: parseFloat(item.subtotale.toFixed(2))
                }))
            };
            const jsonStr = JSON.stringify(ordine, null, 2);

            // ── PDF con jsPDF ──
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: 'a4' });
            const margin = 20;
            const pageW = 210;
            const colW = pageW - margin * 2;
            let y = 20;

            // Titolo
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(20);
            doc.text('Carrello Acquisti', pageW / 2, y, { align: 'center' });
            y += 12;

            // Sezione Ordine
            doc.setFontSize(14);
            doc.text('Ordine', margin, y);
            y += 2;
            doc.setDrawColor(200, 200, 200);
            doc.line(margin, y, pageW - margin, y);
            y += 8;

            // Cliente e Data
            doc.setFontSize(11);
            doc.setFont('helvetica', 'bold');
            doc.text('Cliente:', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.text(cliente, margin + 22, y);
            y += 8;
            doc.setFont('helvetica', 'bold');
            doc.text('Data:', margin, y);
            doc.setFont('helvetica', 'normal');
            doc.text(dataStr, margin + 22, y);
            y += 10;

            // Intestazione tabella
            doc.setFillColor(245, 245, 245);
            doc.rect(margin, y - 5, colW, 8, 'F');
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(10);
            doc.text('Prodotto', margin + 2, y);
            doc.text('Prezzo', margin + 108, y, { align: 'right' });
            doc.text('Qtà', margin + 128, y, { align: 'right' });
            doc.text('Totale', margin + colW - 2, y, { align: 'right' });
            y += 6;
            doc.line(margin, y, pageW - margin, y);
            y += 6;

            // Righe prodotti
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            carrello.forEach(item => {
                // Wrappa testo prodotto lungo
                const nomeLines = doc.splitTextToSize(item.prodotto, 100);
                doc.text(nomeLines, margin + 2, y);
                doc.text('€' + fmt(item.prezzo), margin + 108, y, { align: 'right' });
                doc.text(String(item.quantita), margin + 128, y, { align: 'right' });
                doc.text('€' + fmt(item.subtotale), margin + colW - 2, y, { align: 'right' });
                y += nomeLines.length > 1 ? nomeLines.length * 5 : 5;
                // Categoria e linea in piccolo
                doc.setFontSize(8);
                doc.setTextColor(140, 140, 140);
                const catLine = doc.splitTextToSize(item.categoria + ' › ' + item.linea, 100);
                doc.text(catLine, margin + 2, y);
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                y += catLine.length * 4 + 3;
                doc.setDrawColor(230, 230, 230);
                doc.line(margin, y - 2, pageW - margin, y - 2);
            });

            // Totale
            y += 4;
            doc.line(margin, y, pageW - margin, y);
            y += 8;
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(12);
            doc.text('Totale:', margin, y);
            doc.text('€' + fmt(totale), margin + colW - 2, y, { align: 'right' });

            const pdfBytes = doc.output('arraybuffer');

            // ── ZIP ──
            const zip = new JSZip();
            zip.file(nomeBase + '.json', jsonStr);
            zip.file(nomeBase + '.pdf', pdfBytes);

            const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = nomeBase + '.zip';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Inizializza
        ripristinaStato();
        aggiornaCarrello();
        
        // Fix per input number su iOS
        document.addEventListener('touchstart', function() {}, false);
        
        // Prevent zoom on iOS when focusing on inputs
        const allInputs = document.querySelectorAll('input, select');
        allInputs.forEach(input => {
            input.addEventListener('focus', function() {
                document.body.style.fontSize = '16px';
            });
        });
    </script>
</body>
</html>
